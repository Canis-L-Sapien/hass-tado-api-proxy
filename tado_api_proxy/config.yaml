name: "Tado API Proxy"
description: "Self-hosted proxy for Tado's API with automatic OAuth token rotation"
version: "1.1.0"
slug: "tado_api_proxy"
url: "https://github.com/s1adem4n/tado-api-proxy"
init: false
startup: application
watchdog: http://[HOST]:[PORT:8080]/
arch:
  - aarch64
  - amd64
ports:
  8080/tcp: 8090
ports_description:
  8080/tcp: "Tado API Proxy Web UI"
options:
  superuser_email: "admin@example.com"
  superuser_password: ""
schema:
  superuser_email: email
  superuser_password: password
